<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --raised: #1e1e24;
    --border: #2a2a35;
    --accent: #c8f542;
    --accent-dim: #9dbf2e;
    --op-bg: #252530;
    --op-active: #c8f542;
    --text-primary: #f0f0f5;
    --text-dim: #6b6b80;
    --text-display: #ffffff;
    --btn-radius: 14px;
    --shadow-key: 0 4px 0 #0a0a0c, 0 6px 16px rgba(0,0,0,0.5);
    --shadow-press: 0 1px 0 #0a0a0c, 0 2px 6px rgba(0,0,0,0.4);
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(200,245,66,0.08) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px);
    font-family: 'DM Sans', sans-serif;
  }

  .calculator {
    width: 340px;
    background: var(--surface);
    border-radius: 28px;
    border: 1px solid var(--border);
    padding: 24px 20px 28px;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 40px 80px rgba(0,0,0,0.8),
      0 0 60px rgba(200,245,66,0.04);
    position: relative;
  }

  .calculator::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,245,66,0.4), transparent);
    border-radius: 50%;
  }

  .brand {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-align: right;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  .display {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px 14px;
    margin-bottom: 20px;
    min-height: 96px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: flex-end;
    position: relative;
    overflow: hidden;
  }

  .display::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(200,245,66,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  .display-expr {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    min-height: 18px;
    word-break: break-all;
    text-align: right;
  }

  .display-num {
    font-family: 'Space Mono', monospace;
    font-size: 42px;
    font-weight: 700;
    color: var(--text-display);
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-top: 4px;
  }

  .display-num::after {
    content: '|';
    color: var(--accent);
    animation: blink 1.1s step-end infinite;
    margin-left: 2px;
    font-weight: 300;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .btn-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .btn {
    position: relative;
    height: 64px;
    border-radius: var(--btn-radius);
    border: none;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.02em;
    transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.1s ease;
    outline: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-num {
    background: var(--raised);
    color: var(--text-primary);
    box-shadow: var(--shadow-key);
    border: 1px solid rgba(255,255,255,0.05);
  }

  .btn-num:hover {
    background: #24242c;
    color: #fff;
  }

  .btn-num:active {
    transform: translateY(3px);
    box-shadow: var(--shadow-press);
    background: #2a2a34;
  }

  .btn-op {
    background: var(--op-bg);
    color: var(--accent);
    box-shadow: var(--shadow-key);
    border: 1px solid rgba(200,245,66,0.1);
    font-size: 20px;
  }

  .btn-op:hover {
    background: #2e2e3a;
    border-color: rgba(200,245,66,0.25);
  }

  .btn-op:active {
    transform: translateY(3px);
    box-shadow: var(--shadow-press);
    background: rgba(200,245,66,0.15);
  }

  .btn-eq {
    background: var(--accent);
    color: #0d0d0f;
    box-shadow: 0 4px 0 #6a8010, 0 6px 20px rgba(200,245,66,0.3);
    border: none;
    font-size: 22px;
  }

  .btn-eq:hover {
    background: #d4fc52;
    box-shadow: 0 4px 0 #6a8010, 0 6px 28px rgba(200,245,66,0.45);
  }

  .btn-eq:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #6a8010, 0 2px 10px rgba(200,245,66,0.2);
  }

  .btn-clear {
    background: #2a1a1a;
    color: #ff6b6b;
    box-shadow: var(--shadow-key);
    border: 1px solid rgba(255,100,100,0.12);
  }

  .btn-clear:hover {
    background: #331e1e;
    border-color: rgba(255,100,100,0.25);
  }

  .btn-clear:active {
    transform: translateY(3px);
    box-shadow: var(--shadow-press);
  }

  .btn-zero {
    grid-column: span 2;
    text-align: left;
    padding-left: 24px;
    font-size: 17px;
  }

  .btn-back { font-size: 16px; }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: radial-gradient(circle at center, rgba(255,255,255,0.15) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .btn:active::after { opacity: 1; }

  .row-sep {
    grid-column: 1 / -1;
    height: 1px;
    background: var(--border);
    margin: 2px 0;
    opacity: 0.5;
  }

  .mode-dots {
    display: flex;
    gap: 5px;
    margin-bottom: 14px;
    padding-left: 2px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .dot:nth-child(1) { background: #ff5f57; }
  .dot:nth-child(2) { background: #febc2e; }
  .dot:nth-child(3) { background: var(--accent); }
</style>
</head>
<body>

<div class="calculator">
  <div class="mode-dots">
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>
  <div class="brand">Calculator</div>

  <div class="display">
    <div class="display-num">0</div>
  </div>

  <div class="btn-grid">

 
    <button class="btn btn-clear">AC</button>
    <button class="btn btn-clear btn-back">⌫</button>
    <button class="btn btn-op">%</button>
    <button class="btn btn-op">÷</button>

    
    <button class="btn btn-num">7</button>
    <button class="btn btn-num">8</button>
    <button class="btn btn-num">9</button>
    <button class="btn btn-op">×</button>

  
    <button class="btn btn-num">4</button>
    <button class="btn btn-num">5</button>
    <button class="btn btn-num">6</button>
    <button class="btn btn-op">−</button>

 
    <button class="btn btn-num">1</button>
    <button class="btn btn-num">2</button>
    <button class="btn btn-num">3</button>
    <button class="btn btn-op">+</button>

   
    <button class="btn btn-num btn-zero">0</button>
    <button class="btn btn-num">.</button>
    <button class="btn btn-eq">=</button>

  </div>
</div>

</body>
</html>
